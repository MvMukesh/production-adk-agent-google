services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "${ADK_API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      ADK_API_HOST: 0.0.0.0
      ADK_API_PORT: 8000
      ADK_AGENTS_DIR: agents
      ADK_DB_URL: sqlite:///./data/sessions.db
    volumes:
      - adk-data:/app/data
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "${NEXT_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      ADK_API_BASE: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  adk-data:
